# [DOCUMENTACIÓN] Modificación 2026-07-03: Se excluyó el archivo de variables de entorno '.env' del rsync --delete.
name: Deploy PRODESIGN FRONT

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # ⬇️ ESTE ES EL PASO QUE FALTABA
      # ============================================
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Sincronizar archivos
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          SOURCE: "./"
          TARGET: "/home/ftpceon/ftp/prodesign/prodesign/"
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: >
            /.git/,
            /.github/,
            node_modules/,
            logs/,
            .env,

      - name: Desplegar con Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/ftpceon/ftp/prodesign/prodesign/

            echo "========================================="
            echo "Archivos sincronizados:"
            ls -la
            echo "========================================="

            echo "Actualizando VITE_URL_PROBUDGETS_PORTAL en .env..."
            sed -i 's|VITE_URL_PROBUDGETS_PORTAL=.*|VITE_URL_PROBUDGETS_PORTAL=https://probudget.pro-invest.pe/admin/budget/list|' .env 2>/dev/null || true

            echo "Validando docker-compose..."
            docker compose config > /dev/null

            echo "Deteniendo contenedores anteriores..."
            docker compose -p prodesign-react down

            echo "Construyendo imágenes SIN CACHÉ..."
            docker compose -p prodesign-react build --no-cache

            echo "Levantando contenedores..."
            docker compose -p prodesign-react up -d --force-recreate

            echo "Limpiando imágenes residuales..."
            docker image prune -f

            echo "========================================="
            echo "Estado final:"
            docker compose -p prodesign-react ps
            echo "Logs recientes:"
            docker compose -p prodesign-react logs --tail=20
            echo "========================================="