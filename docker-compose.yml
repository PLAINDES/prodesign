services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
        - VITE_API_BASE_URL_CALCULATE=http://localhost:8001
    container_name: prodesign-react
    ports:
      - "5199:80"
    restart: always
    networks:
      - prosupervision_network

networks:
  prosupervision_network:
    external: true