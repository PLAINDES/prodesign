services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_API_BASE_URL_CALCULATE: ${VITE_API_BASE_URL_CALCULATE}
        VITE_URL_PROINVIERTE: ${VITE_URL_PROINVIERTE}
    container_name: prodesign-react
    ports:
      - "5199:80"
    restart: always
    networks:
      - prodesign_network

networks:
  prodesign_network:
    external: true